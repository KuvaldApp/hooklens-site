<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookLens — My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --bg2: #0d1018;
    --surface: #111520;
    --surface2: #161b28;
    --border: rgba(255,255,255,0.06);
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --accent3: #00ff9d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  nav {
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,10,15,0.95);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); text-shadow: 0 0 20px rgba(0,229,255,0.5); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 600; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .nav-btn:hover { border-color: rgba(0,229,255,0.3); color: var(--text); }

  .page { max-width: 860px; margin: 0 auto; padding: 56px 24px 80px; }

  .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 48px; }
  .avatar-large {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .page-header-text h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; color: var(--text); margin-bottom: 4px; }
  .page-header-text p { font-size: 14px; color: var(--muted); font-weight: 300; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 32px; margin-bottom: 20px;
  }
  .card-title {
    font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }

  .plan-card {
    background: linear-gradient(135deg, rgba(0,229,255,0.04), rgba(123,97,255,0.03));
    border-color: rgba(0,229,255,0.15); position: relative; overflow: hidden;
  }
  .plan-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }
  .plan-info { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
  .plan-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700;
    color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em;
  }
  .plan-badge .plan-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3); box-shadow: 0 0 6px var(--accent3); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .plan-scans { text-align: right; }
  .plan-scans-num { font-size: 36px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; }
  .plan-scans-num span { color: var(--accent); }
  .plan-scans-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .scan-progress-bar { margin-top: 20px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .scan-progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), var(--accent)); box-shadow: 0 0 10px rgba(0,229,255,0.4); transition: width 0.8s ease; }
  .scan-progress-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .cancel-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .cancel-text { font-size: 13px; color: var(--muted); font-weight: 300; }
  .cancel-btn { background: none; border: 1px solid rgba(255,107,107,0.3); color: var(--danger); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.03em; text-decoration: none; display: inline-block; }
  .cancel-btn:hover { background: rgba(255,107,107,0.06); border-color: rgba(255,107,107,0.5); }
  .upgrade-btn { background: var(--accent); color: #000; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; text-transform: uppercase; letter-spacing: 0.04em; box-shadow: 0 0 20px rgba(0,229,255,0.25); }
  .upgrade-btn:hover { box-shadow: 0 0 35px rgba(0,229,255,0.45); transform: translateY(-1px); }

  /* SCAN HISTORY */
  .history-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; font-weight: 300; }
  .history-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  .scan-item {
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
    margin: 0 -16px;
    padding: 16px;
    border-radius: 8px;
  }
  .scan-item:last-child { border-bottom: none; }
  .scan-item:hover { background: rgba(255,255,255,0.03); }
  .scan-item-header { display: flex; align-items: center; gap: 16px; }
  .scan-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .scan-info { flex: 1; min-width: 0; }
  .scan-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .scan-date { font-size: 12px; color: var(--muted); font-weight: 300; }
  .scan-score { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .score-pill { font-size: 13px; font-weight: 800; padding: 4px 10px; border-radius: 6px; letter-spacing: -0.3px; }
  .score-high { background: rgba(0,255,157,0.1); color: var(--accent3); }
  .score-mid { background: rgba(0,229,255,0.1); color: var(--accent); }
  .score-low { background: rgba(255,107,107,0.1); color: var(--danger); }
  .scan-chevron { color: var(--muted); font-size: 11px; transition: transform 0.25s; flex-shrink: 0; margin-left: 4px; }
  .scan-item.open .scan-chevron { transform: rotate(180deg); }

  /* EXPAND AREA */
  .scan-expand { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .scan-item.open .scan-expand { display: block; }

  .expand-scores { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .expand-score-chip {
    display: flex; flex-direction: column; align-items: center;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; min-width: 62px;
  }
  .expand-score-chip .chip-val { font-size: 18px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .expand-score-chip .chip-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
  .c-high { color: var(--accent3); } .c-mid { color: var(--accent); } .c-low { color: #ffb347; } .c-danger { color: var(--danger); }

  .expand-verdict { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
  .expand-topfix { background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6; }
  .expand-topfix-label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
  .expand-geo { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .expand-geo-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 12px; margin-bottom: 6px; }
  .expand-geo-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; border: 1px solid; }
  .geo-s { background: rgba(0,255,157,0.08); color: var(--accent3); border-color: rgba(0,255,157,0.2); }
  .geo-m { background: rgba(0,229,255,0.06); color: var(--accent); border-color: rgba(0,229,255,0.15); }
  .geo-w { background: rgba(255,107,107,0.06); color: var(--danger); border-color: rgba(255,107,107,0.15); }

  /* FULL BREAKDOWN SECTIONS */
  .breakdowns-wrap { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
  .breakdown-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .breakdown-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .breakdown-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .breakdown-score { font-size: 14px; font-weight: 800; padding: 2px 8px; border-radius: 5px; background: var(--surface2); }
  .breakdown-text { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
  .breakdown-issues { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
  .breakdown-issue { font-size: 12px; color: var(--danger); line-height: 1.5; padding-left: 4px; }
  .breakdown-improvements { display: flex; flex-direction: column; gap: 5px; }
  .breakdown-improvement { font-size: 12px; color: var(--accent3); line-height: 1.5; padding-left: 4px; }
  .breakdown-fix { font-size: 12px; color: var(--accent); line-height: 1.6; margin-top: 6px; padding: 8px 10px; background: rgba(0,229,255,0.04); border-left: 2px solid rgba(0,229,255,0.3); border-radius: 0 6px 6px 0; }
  .breakdown-fix-label { font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; margin-right: 4px; }

  .persona-lines { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }
  .persona-line { font-size: 12px; color: var(--text); line-height: 1.5; padding: 5px 10px; background: var(--bg2); border-radius: 6px; border: 1px solid var(--border); }

  /* SCRIPT TABLE */
  .script-table { display: flex; flex-direction: column; gap: 6px; }
  .script-row { padding: 10px 12px; border-radius: 8px; border-left: 3px solid; background: var(--bg); }
  .script-row-good { border-color: var(--accent3); }
  .script-row-weak { border-color: #ffb347; }
  .script-row-bad { border-color: var(--danger); }
  .script-time { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .script-original { font-size: 13px; color: var(--text); line-height: 1.5; }
  .script-rewrite { font-size: 12px; color: var(--accent); margin-top: 5px; line-height: 1.5; padding: 5px 8px; background: rgba(0,229,255,0.04); border-radius: 4px; }
  .script-issue-text { font-size: 11px; color: #ffb347; margin-top: 4px; }

  /* DOWNLOAD BUTTON */
  .expand-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
  .download-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600; padding: 7px 14px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
  }
  .download-btn:hover { border-color: rgba(0,229,255,0.3); color: var(--text); }

  /* LOADING */
  .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; gap: 12px; color: var(--muted); font-size: 14px; }
  .spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .auth-required { text-align: center; padding: 80px 24px; }
  .auth-required h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
  .auth-required p { color: var(--muted); margin-bottom: 28px; font-size: 15px; font-weight: 300; }

  /* REPORT CARD — used for PNG export, hidden off-screen */
  .report-card {
    position: fixed; left: -9999px; top: 0;
    width: 680px;
    background: #080a0f;
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 20px;
    padding: 40px 44px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: #e8eaf0;
  }
  .report-card .rc-logo { font-size: 15px; font-weight: 800; color: #e8eaf0; margin-bottom: 28px; letter-spacing: -0.3px; }
  .report-card .rc-logo span { color: #00e5ff; }
  .report-card .rc-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 3px; line-height: 1.3; }
  .report-card .rc-date { font-size: 12px; color: #6b7280; margin-bottom: 24px; }

  .report-card .rc-score-row { display: flex; align-items: center; gap: 24px; margin-bottom: 24px; padding: 20px 24px; background: #0d1018; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
  .report-card .rc-total-wrap { flex-shrink: 0; }
  .report-card .rc-total { font-size: 56px; font-weight: 800; letter-spacing: -3px; line-height: 1; }
  .report-card .rc-total-label { font-size: 11px; color: #6b7280; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .report-card .rc-chips-inline { display: flex; flex-wrap: wrap; gap: 8px; }
  .report-card .rc-chip { display: flex; flex-direction: column; align-items: center; background: #111520; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 14px; min-width: 68px; }
  .report-card .rc-chip .cv { font-size: 20px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .report-card .rc-chip .cl { font-size: 9px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; }

  .report-card .rc-verdict-block { font-size: 13px; color: #9ca3af; font-style: italic; line-height: 1.7; margin-bottom: 20px; padding: 14px 18px; border-left: 3px solid rgba(0,229,255,0.3); background: rgba(0,229,255,0.03); border-radius: 0 8px 8px 0; }

  .report-card .rc-topfix-block { margin-bottom: 24px; }
  .report-card .rc-topfix-label { font-size: 10px; font-weight: 700; color: #00e5ff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .report-card .rc-topfix { font-size: 13px; color: #e8eaf0; line-height: 1.6; padding: 14px 16px; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15); border-radius: 8px; }

  .report-card .rc-analysis-block { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .report-card .rc-analysis-block:last-of-type { border-bottom: none; }
  .report-card .rc-analysis-label { font-size: 10px; font-weight: 700; color: #00e5ff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .report-card .rc-analysis-text { font-size: 12px; color: #d1d5db; line-height: 1.6; }
  .report-card .rc-analysis-fix { font-size: 12px; color: #00e5ff; line-height: 1.6; margin-top: 6px; padding: 7px 10px; background: rgba(0,229,255,0.05); border-left: 2px solid rgba(0,229,255,0.3); border-radius: 0 5px 5px 0; }

  .report-card .rc-script-table { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
  .report-card .rc-script-row { padding: 8px 12px; border-radius: 6px; border-left: 3px solid; background: #0d1018; }
  .report-card .rc-script-good { border-color: #00ff9d; }
  .report-card .rc-script-weak { border-color: #ffb347; }
  .report-card .rc-script-bad { border-color: #ff6b6b; }
  .report-card .rc-script-time { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .report-card .rc-script-original { font-size: 12px; color: #e8eaf0; line-height: 1.4; }
  .report-card .rc-script-issue { font-size: 11px; color: #ffb347; margin-top: 4px; }
  .report-card .rc-script-rewrite { font-size: 11px; color: #00e5ff; margin-top: 4px; }

  .report-card .rc-geo { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .report-card .rc-geo-label { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; margin-top: 18px; }
  .report-card .rc-geo-tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 5px; border: 1px solid; }
  .report-card .rc-footer { margin-top: 28px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 11px; color: #6b7280; }
</style>

<script>
// ── HookLens Auth Module ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://tvfmnfckawtvbmwfaxjv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_KhnkmTKYGENhuuLpekLLwg_j2M2AHsK';
const BACKEND = 'https://hooklens-api.onrender.com';
const STRIPE_PORTAL = 'https://billing.stripe.com/p/login/00w5kD7ZQd0b6VndY7aIM00';

function loadSupabase() {
  return new Promise((resolve) => {
    if (window._supabaseClient) return resolve(window._supabaseClient);
    if (window.supabase) {
      window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return resolve(window._supabaseClient);
    }
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    script.onload = () => {
      window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      resolve(window._supabaseClient);
    };
    script.onerror = () => resolve(null);
    document.head.appendChild(script);
  });
}
function getClient() { return window._supabaseClient; }
async function getSession() {
  const client = getClient(); if (!client) return null;
  const { data } = await client.auth.getSession(); return data.session;
}
async function getUser() { const s = await getSession(); return s?.user || null; }
async function getProfile(userId) {
  const client = getClient(); if (!client) return null;
  const { data } = await client.from('profiles').select('*').eq('id', userId).maybeSingle();
  return data;
}
async function signOut() {
  const client = getClient();
  if (client) await client.auth.signOut();
  localStorage.removeItem('hl_email');
  window.location.href = 'index.html';
}
async function syncUserWithBackend(email) {
  try {
    await fetch(BACKEND + '/gate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
  } catch(e) { console.warn('Sync error:', e); }
}
</script>

<script>
  // ── GLOBAL HELPERS ──────────────────────────────────────────────────────

  function getPlanLabel(plan) {
    return { free: 'Free', starter: 'Starter', pro: 'Pro', agency: 'Agency', yearly: 'Yearly Pro' }[plan] || plan;
  }
  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }
  function scoreClass(s) {
    if (s >= 70) return 'score-high'; if (s >= 50) return 'score-mid'; return 'score-low';
  }
  function chipClass(s) {
    if (s >= 80) return 'c-high'; if (s >= 60) return 'c-mid'; if (s >= 40) return 'c-low'; return 'c-danger';
  }
  function scoreColor(s) {
    if (s >= 80) return '#00ff9d'; if (s >= 60) return '#00e5ff'; if (s >= 40) return '#ffb347'; return '#ff6b6b';
  }

  // ── TOGGLE — global so onclick="toggleScan(this)" works ────────────────
  function toggleScan(el) {
    // If clicking inside the download button, don't toggle
    el.classList.toggle('open');
  }

  // ── DOWNLOAD REPORT AS PNG ──────────────────────────────────────────────
  async function downloadReport(event, scanId) {
    event.stopPropagation(); // don't toggle the row

    const scan = window._scanCache && window._scanCache[scanId];
    if (!scan) return;

    let d = {};
    try { d = scan.scan_data ? JSON.parse(scan.scan_data) : {}; } catch(e) {}
    const sc = d.scores || {};
    const scoreItems = [
      { label: 'Hook', val: sc.hook }, { label: 'Body', val: sc.body },
      { label: 'CTA', val: sc.cta }, { label: 'Audio', val: sc.audio },
      { label: 'Captions', val: sc.captions }
    ].filter(s => s.val != null);

    const totalScore = scan.hook_score || sc.overall || null;

    const geoHTML = d.geoFit ? `
      <div class="rc-geo-label">Geographic Fit</div>
      <div class="rc-geo">
        ${(d.geoFit.strong||[]).map(g=>`<span class="rc-geo-tag" style="background:rgba(0,255,157,0.08);color:#00ff9d;border-color:rgba(0,255,157,0.2)">✓ ${g}</span>`).join('')}
        ${(d.geoFit.moderate||[]).map(g=>`<span class="rc-geo-tag" style="background:rgba(0,229,255,0.06);color:#00e5ff;border-color:rgba(0,229,255,0.15)">~ ${g}</span>`).join('')}
        ${(d.geoFit.weak||[]).map(g=>`<span class="rc-geo-tag" style="background:rgba(255,107,107,0.06);color:#ff6b6b;border-color:rgba(255,107,107,0.15)">✗ ${g}</span>`).join('')}
      </div>` : '';

    const rc = document.getElementById('reportCard');
    rc.innerHTML = `
      <div class="rc-logo">Hook<span>Lens</span></div>

      <div class="rc-title">${scan.video_name || 'Untitled Scan'}</div>
      <div class="rc-date">Analyzed ${formatDate(scan.created_at)}</div>

      <div class="rc-score-row">
        ${totalScore ? `<div class="rc-total-wrap"><div class="rc-total" style="color:${scoreColor(totalScore)}">${totalScore}</div><div class="rc-total-label">Overall Score</div></div>` : ''}
        ${scoreItems.length ? `<div class="rc-chips-inline">${scoreItems.map(s => `<div class="rc-chip"><div class="cv" style="color:${scoreColor(s.val)}">${s.val}</div><div class="cl">${s.label}</div></div>`).join('')}</div>` : ''}
      </div>

      ${scan.summary ? `<div class="rc-verdict-block">"${scan.summary}"</div>` : ''}

      ${d.topFix ? `<div class="rc-topfix-block"><div class="rc-topfix-label">⚡ #1 Priority Fix</div><div class="rc-topfix">${d.topFix}</div></div>` : ''}

      ${[
        {label:'Hook', a: d.hookAnalysis},
        {label:'Body', a: d.bodyAnalysis},
        {label:'CTA',  a: d.ctaAnalysis},
        {label:'Audio',a: d.audioAnalysis}
      ].filter(x=>x.a?.summary).map(x=>`
        <div class="rc-analysis-block">
          <div class="rc-analysis-label">${x.label}</div>
          <div class="rc-analysis-text">${x.a.summary}</div>
          ${x.a.fix ? `<div class="rc-analysis-fix">→ ${x.a.fix}</div>` : ''}
        </div>`).join('')}

      ${d.captionAnalysis ? `
        <div class="rc-analysis-block">
          <div class="rc-analysis-label">Captions / Script</div>
          ${d.captionAnalysis.summary ? `<div class="rc-analysis-text">${d.captionAnalysis.summary}</div>` : ''}
          ${d.captionAnalysis.arcAnalysis ? `<div class="rc-analysis-text" style="color:#6b7280;font-style:italic;margin-top:4px">${d.captionAnalysis.arcAnalysis}</div>` : ''}
          ${d.captionAnalysis.fix ? `<div class="rc-analysis-fix">→ ${d.captionAnalysis.fix}</div>` : ''}
          ${(d.captionAnalysis.scriptLines||[]).length ? `
            <div class="rc-script-table">
              ${d.captionAnalysis.scriptLines.map(line=>`
                <div class="rc-script-row rc-script-${line.quality||'good'}">
                  <div class="rc-script-time">${line.time||''}</div>
                  <div class="rc-script-original">${line.original||''}</div>
                  ${line.issue ? `<div class="rc-script-issue">⚠ ${line.issue}</div>` : ''}
                  ${line.rewrite ? `<div class="rc-script-rewrite">→ ${line.rewrite}</div>` : ''}
                </div>`).join('')}
            </div>` : ''}
        </div>` : ''}

      ${geoHTML}

      <div class="rc-footer">Generated by HookLens · hooklens.net</div>
    `;

    // Load html2canvas if not already loaded
    if (!window.html2canvas) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // Temporarily make visible for capture
    rc.style.left = '-9999px';
    rc.style.top = '0px';
    rc.style.display = 'block';

    try {
      const canvas = await html2canvas(rc, {
        backgroundColor: '#0d1018',
        scale: 2,
        useCORS: true,
        logging: false
      });
      const link = document.createElement('a');
      const filename = (scan.video_name || 'hooklens-report').replace(/[^a-z0-9]/gi, '_').toLowerCase();
      link.download = `${filename}_report.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      console.error('Export failed:', e);
      alert('Export failed. Please try again.');
    }

    rc.style.left = '-9999px';
  }

  // ── NAV ─────────────────────────────────────────────────────────────────
  function renderNav(user) {
    const navRight = document.getElementById('navRight');
    if (user) {
      navRight.innerHTML = `
        <a href="hooklens-scanner.html" class="nav-btn">← Scanner</a>
        <button class="nav-btn" onclick="handleSignOut()">Sign Out</button>`;
    } else {
      navRight.innerHTML = `<a href="index.html" class="nav-btn">← Home</a>`;
    }
  }
  async function handleSignOut() { await signOut(); }

  // ── RENDER PROFILE ───────────────────────────────────────────────────────
  async function renderProfile(user, profile) {
    const page = document.getElementById('mainPage');
    const initial = (user.email || 'U')[0].toUpperCase();
    const isPaid = profile.plan !== 'free';
    const scansUsed = profile.scans_used || 0;
    const scansLimit = profile.scans_limit || 1;
    const scansRemaining = Math.max(0, scansLimit - scansUsed);
    const pct = Math.min(100, Math.round((scansUsed / scansLimit) * 100));

    const client = getClient();
    const { data: scans } = await client
      .from('scans').select('*').eq('user_id', user.id)
      .order('created_at', { ascending: false }).limit(20);

    // Cache scans globally for download access
    window._scanCache = {};
    (scans || []).forEach(s => { window._scanCache[s.id] = s; });

    function buildScanItem(scan) {
      let expandHTML = '';
      let hasExpand = false;

      if (scan.scan_data) {
        try {
          const d = JSON.parse(scan.scan_data);
          const sc = d.scores || {};
          const scoreItems = [
            { label: 'Hook', val: sc.hook }, { label: 'Body', val: sc.body },
            { label: 'CTA', val: sc.cta }, { label: 'Audio', val: sc.audio },
            { label: 'Captions', val: sc.captions }
          ].filter(s => s.val != null);

          const chips = scoreItems.map(s =>
            `<div class="expand-score-chip">
              <div class="chip-val ${chipClass(s.val)}">${s.val}</div>
              <div class="chip-label">${s.label}</div>
            </div>`).join('');

          // Full section breakdowns
          function analysisBlock(label, score, obj) {
            if (!obj) return '';
            const lines = [];
            if (obj.summary) lines.push(`<div class="breakdown-text">${obj.summary}</div>`);
            if (obj.fix) lines.push(`<div class="breakdown-fix"><span class="breakdown-fix-label">→ Fix</span> ${obj.fix}</div>`);
            if (!lines.length) return '';
            const cls = score != null ? chipClass(score) : '';
            return `<div class="breakdown-section">
              <div class="breakdown-header">
                <span class="breakdown-label">${label}</span>
                ${score != null ? `<span class="breakdown-score ${cls}">${score}</span>` : ''}
              </div>
              ${lines.join('')}
            </div>`;
          }

          const breakdowns = [
            analysisBlock('Hook', sc.hook, d.hookAnalysis),
            analysisBlock('Body', sc.body, d.bodyAnalysis),
            analysisBlock('CTA', sc.cta, d.ctaAnalysis),
            analysisBlock('Audio', sc.audio, d.audioAnalysis),
          ].filter(Boolean).join('');

          // Caption / Script analysis
          let captionBlock = '';
          if (d.captionAnalysis) {
            const ca = d.captionAnalysis;
            const cls = ca.score != null ? chipClass(ca.score) : '';
            const scriptRows = (ca.scriptLines || []).map(line => {
              const rowCls = line.quality === 'good' ? 'script-row-good' : line.quality === 'weak' ? 'script-row-weak' : 'script-row-bad';
              return `<div class="script-row ${rowCls}">
                <div class="script-time">${line.time || ''}</div>
                <div class="script-original">${line.original || ''}</div>
                ${line.rewrite ? `<div class="script-rewrite">→ ${line.rewrite}</div>` : ''}
                ${line.issue ? `<div class="script-issue-text">⚠ ${line.issue}</div>` : ''}
              </div>`;
            }).join('');
            captionBlock = `<div class="breakdown-section">
              <div class="breakdown-header">
                <span class="breakdown-label">Captions / Script</span>
                ${ca.score != null ? `<span class="breakdown-score ${cls}">${ca.score}</span>` : ''}
              </div>
              ${ca.summary ? `<div class="breakdown-text">${ca.summary}</div>` : ''}
              ${ca.arcAnalysis ? `<div class="breakdown-text" style="margin-top:8px;color:var(--muted);font-style:italic">${ca.arcAnalysis}</div>` : ''}
              ${ca.fix ? `<div class="breakdown-fix"><span class="breakdown-fix-label">→ Fix</span> ${ca.fix}</div>` : ''}
              ${scriptRows ? `<div class="script-table" style="margin-top:14px">${scriptRows}</div>` : ''}
            </div>`;
          }

          const geoBlock = d.geoFit ? `
            <div class="expand-geo-label">Geographic Fit</div>
            <div class="expand-geo">
              ${(d.geoFit.strong||[]).map(g=>`<span class="expand-geo-tag geo-s">✓ ${g}</span>`).join('')}
              ${(d.geoFit.moderate||[]).map(g=>`<span class="expand-geo-tag geo-m">~ ${g}</span>`).join('')}
              ${(d.geoFit.weak||[]).map(g=>`<span class="expand-geo-tag geo-w">✗ ${g}</span>`).join('')}
            </div>` : '';

          const personaBlock = d.persona ? (() => {
            const p = typeof d.persona === 'string' ? (() => { try { return JSON.parse(d.persona); } catch(e) { return null; } })() : d.persona;
            if (!p) return '';
            const lines = [
              p.age ? `Age: ${p.age}` : '',
              p.gender ? `Gender: ${p.gender}` : '',
              p.income ? `Income: ${p.income}` : '',
              p.intent ? `Intent: ${p.intent}` : '',
              p.psychographic ? `Profile: ${p.psychographic}` : ''
            ].filter(Boolean);
            return `<div class="expand-geo-label" style="margin-top:16px">Target Persona</div>
              <div class="persona-lines">${lines.map(l => `<div class="persona-line">${l}</div>`).join('')}</div>`;
          })() : '';

          hasExpand = true;
          expandHTML = `
            ${chips ? `<div class="expand-scores">${chips}</div>` : ''}
            ${scan.summary ? `<div class="expand-verdict">"${scan.summary}"</div>` : ''}
            ${d.topFix ? `<div class="expand-topfix"><div class="expand-topfix-label">⚡ #1 Fix</div>${d.topFix}</div>` : ''}
            ${breakdowns ? `<div class="breakdowns-wrap">${breakdowns}${captionBlock}</div>` : (captionBlock ? `<div class="breakdowns-wrap">${captionBlock}</div>` : '')}
            ${geoBlock}
            ${personaBlock}
            <div class="expand-actions">
              <button class="download-btn" onclick="downloadReport(event, '${scan.id}')">
                ↓ Download Report
              </button>
            </div>`;
        } catch(e) {
          if (scan.summary) {
            hasExpand = true;
            expandHTML = `<div class="expand-verdict">"${scan.summary}"</div>
              <div class="expand-actions">
                <button class="download-btn" onclick="downloadReport(event, '${scan.id}')">↓ Download Report</button>
              </div>`;
          }
        }
      } else if (scan.summary) {
        hasExpand = true;
        expandHTML = `<div class="expand-verdict">"${scan.summary}"</div>
          <div class="expand-actions">
            <button class="download-btn" onclick="downloadReport(event, '${scan.id}')">↓ Download Report</button>
          </div>`;
      }

      return `
        <div class="scan-item${hasExpand ? '' : ''}" onclick="toggleScan(this)">
          <div class="scan-item-header">
            <div class="scan-icon">🎬</div>
            <div class="scan-info">
              <div class="scan-name">${scan.video_name || 'Untitled scan'}</div>
              <div class="scan-date">${formatDate(scan.created_at)}</div>
            </div>
            ${scan.hook_score ? `<div class="scan-score"><div class="score-pill ${scoreClass(scan.hook_score)}">${scan.hook_score}/100</div></div>` : ''}
            ${hasExpand ? `<div class="scan-chevron">▼</div>` : ''}
          </div>
          ${hasExpand ? `<div class="scan-expand">${expandHTML}</div>` : ''}
        </div>`;
    }

    const historyHTML = scans && scans.length > 0
      ? scans.map(buildScanItem).join('')
      : `<div class="history-empty">
          <div class="history-empty-icon">🎬</div>
          <div>No scans yet — your analysis history will appear here.</div>
        </div>`;

    page.innerHTML = `
      <div class="page-header">
        <div class="avatar-large">${initial}</div>
        <div class="page-header-text">
          <h1>${user.email.split('@')[0]}</h1>
          <p>${user.email} · Member since ${formatDate(profile.created_at || user.created_at)}</p>
        </div>
      </div>

      <div class="card plan-card">
        <div class="card-title"><span>⚡</span> Current Plan</div>
        <div class="plan-info">
          <div>
            <div class="plan-badge"><div class="plan-dot"></div>${getPlanLabel(profile.plan)}</div>
            ${profile.paid_at ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;">Active since ${formatDate(profile.paid_at)}</div>` : ''}
          </div>
          <div class="plan-scans">
            <div class="plan-scans-num"><span>${scansRemaining}</span> / ${scansLimit}</div>
            <div class="plan-scans-label">scans remaining this month</div>
          </div>
        </div>
        <div class="scan-progress-bar"><div class="scan-progress-fill" style="width:${pct}%"></div></div>
        <div class="scan-progress-labels"><span>${scansUsed} used</span><span>${scansRemaining} remaining</span></div>
        <div class="cancel-section">
          ${isPaid
            ? `<div class="cancel-text">To cancel or change your subscription, visit the billing portal.</div>
               <a href="${STRIPE_PORTAL}" target="_blank" class="cancel-btn">Manage Subscription →</a>`
            : `<div class="cancel-text">Upgrade to get more scans every month.</div>
               <a href="hooklens-scanner.html" class="upgrade-btn" onclick="localStorage.setItem('hl_show_paywall','1')">Upgrade Plan →</a>`
          }
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span>📋</span> Scan History</div>
        ${historyHTML}
      </div>
    `;
  }

  function renderAuthRequired() {
    document.getElementById('mainPage').innerHTML = `
      <div class="auth-required">
        <h2>Sign in to view your profile</h2>
        <p>You need to be logged in to access your profile and scan history.</p>
        <a href="index.html" class="upgrade-btn">Go to Home →</a>
      </div>`;
  }

  // ── INIT ─────────────────────────────────────────────────────────────────
  (async () => {
    await loadSupabase();
    const client = getClient();
    client.auth.onAuthStateChange((event, session) => { renderNav(session?.user || null); });
    const user = await getUser();
    renderNav(user);
    if (!user) { renderAuthRequired(); return; }
    const profile = await getProfile(user.id);
    if (!profile) {
      await syncUserWithBackend(user.email);
      const retry = await getProfile(user.id);
      if (retry) { await renderProfile(user, retry); } else { renderAuthRequired(); }
      return;
    }
    await renderProfile(user, profile);
  })();
</script>
</body>
</html>
