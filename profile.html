<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HookLens — My Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --bg2: #0d1018;
    --surface: #111520;
    --surface2: #161b28;
    --border: rgba(255,255,255,0.06);
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --accent3: #00ff9d;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,10,15,0.95);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); text-shadow: 0 0 20px rgba(0,229,255,0.5); }

  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 600; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-block;
  }
  .nav-btn:hover { border-color: rgba(0,229,255,0.3); color: var(--text); }
  .nav-btn-primary {
    background: var(--accent); color: #000; border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 700; padding: 9px 18px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-block;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .nav-btn-primary:hover { box-shadow: 0 0 20px rgba(0,229,255,0.4); transform: translateY(-1px); }

  /* PAGE */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 56px 24px 80px;
  }

  .page-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 48px;
  }

  .avatar-large {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }

  .page-header-text h1 {
    font-size: 26px; font-weight: 800; letter-spacing: -0.8px;
    color: var(--text); margin-bottom: 4px;
  }
  .page-header-text p { font-size: 14px; color: var(--muted); font-weight: 300; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 12px; font-weight: 700;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  /* PLAN CARD */
  .plan-card {
    background: linear-gradient(135deg, rgba(0,229,255,0.04), rgba(123,97,255,0.03));
    border-color: rgba(0,229,255,0.15);
    position: relative; overflow: hidden;
  }
  .plan-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }

  .plan-info {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 20px;
  }

  .plan-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.2);
    border-radius: 8px; padding: 8px 14px;
    font-size: 13px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .plan-badge .plan-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent3); box-shadow: 0 0 6px var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .plan-scans {
    text-align: right;
  }
  .plan-scans-num {
    font-size: 36px; font-weight: 800; letter-spacing: -2px;
    color: var(--text); line-height: 1;
  }
  .plan-scans-num span { color: var(--accent); }
  .plan-scans-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .scan-progress-bar {
    margin-top: 20px;
    height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden;
  }
  .scan-progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    box-shadow: 0 0 10px rgba(0,229,255,0.4);
    transition: width 0.8s ease;
  }
  .scan-progress-labels {
    display: flex; justify-content: space-between;
    margin-top: 8px; font-size: 11px; color: var(--muted);
  }

  /* CANCEL */
  .cancel-section {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .cancel-text { font-size: 13px; color: var(--muted); font-weight: 300; }
  .cancel-btn {
    background: none; border: 1px solid rgba(255,107,107,0.3);
    color: var(--danger); font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .cancel-btn:hover { background: rgba(255,107,107,0.06); border-color: rgba(255,107,107,0.5); }

  .upgrade-btn {
    background: var(--accent); color: #000;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px; font-weight: 700; padding: 10px 20px;
    border-radius: 8px; border: none; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
    display: inline-block; text-transform: uppercase; letter-spacing: 0.04em;
    box-shadow: 0 0 20px rgba(0,229,255,0.25);
  }
  .upgrade-btn:hover { box-shadow: 0 0 35px rgba(0,229,255,0.45); transform: translateY(-1px); }

  /* SCAN HISTORY */
  .history-empty {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 14px; font-weight: 300;
  }
  .history-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  .scan-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }
  .scan-item:last-child { border-bottom: none; }

  .scan-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .scan-info { flex: 1; min-width: 0; }
  .scan-name {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .scan-date { font-size: 12px; color: var(--muted); font-weight: 300; }

  .scan-score {
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .score-pill {
    font-size: 13px; font-weight: 800;
    padding: 4px 10px; border-radius: 6px;
    letter-spacing: -0.3px;
  }
  .score-high { background: rgba(0,255,157,0.1); color: var(--accent3); }
  .score-mid { background: rgba(0,229,255,0.1); color: var(--accent); }
  .score-low { background: rgba(255,107,107,0.1); color: var(--danger); }

  /* LOADING */
  .loading-spinner {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; gap: 12px; color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NOT LOGGED IN */
  .auth-required {
    text-align: center; padding: 80px 24px;
  }
  .auth-required h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
  .auth-required p { color: var(--muted); margin-bottom: 28px; font-size: 15px; font-weight: 300; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Hook<span>Lens</span></a>
  <div class="nav-right" id="navRight">
    <div class="loading-spinner" style="padding:0;"><div class="spinner"></div></div>
  </div>
</nav>

<div class="page" id="mainPage">
  <div class="loading-spinner"><div class="spinner"></div><span>Loading your profile...</span></div>
</div>

<script src="auth.js"></script>
<script>
  const STRIPE_PORTAL = 'https://billing.stripe.com/p/login/00w5kD7ZQd0b6VndY7aIM00';

  function getPlanLabel(plan) {
    const labels = { free: 'Free', starter: 'Starter', pro: 'Pro', agency: 'Agency', yearly: 'Yearly Pro' };
    return labels[plan] || plan;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function scoreClass(s) {
    if (s >= 70) return 'score-high';
    if (s >= 50) return 'score-mid';
    return 'score-low';
  }

  function renderNav(user) {
    const navRight = document.getElementById('navRight');
    if (user) {
      navRight.innerHTML = `
        <a href="hooklens-scanner.html" class="nav-btn">← Scanner</a>
        <button class="nav-btn" onclick="handleSignOut()">Sign Out</button>
      `;
    } else {
      navRight.innerHTML = `<a href="index.html" class="nav-btn">← Home</a>`;
    }
  }

  async function handleSignOut() {
    await signOut();
  }

  async function renderProfile(user, profile) {
    const page = document.getElementById('mainPage');
    const initial = (user.email || 'U')[0].toUpperCase();
    const isPaid = profile.plan !== 'free';
    const scansUsed = profile.scans_used || 0;
    const scansLimit = profile.scans_limit || 1;
    const scansRemaining = Math.max(0, scansLimit - scansUsed);
    const pct = Math.min(100, Math.round((scansUsed / scansLimit) * 100));

    // Load scan history
    const client = getClient();
    const { data: scans } = await client
      .from('scans')
      .select('*')
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(20);

    const historyHTML = scans && scans.length > 0
      ? scans.map(scan => `
          <div class="scan-item">
            <div class="scan-icon">🎬</div>
            <div class="scan-info">
              <div class="scan-name">${scan.video_name || 'Untitled scan'}</div>
              <div class="scan-date">${formatDate(scan.created_at)}</div>
            </div>
            ${scan.hook_score ? `<div class="scan-score"><div class="score-pill ${scoreClass(scan.hook_score)}">${scan.hook_score}/100</div></div>` : ''}
          </div>
        `).join('')
      : `<div class="history-empty">
          <div class="history-empty-icon">🎬</div>
          <div>No scans yet — your analysis history will appear here.</div>
        </div>`;

    page.innerHTML = `
      <div class="page-header">
        <div class="avatar-large">${initial}</div>
        <div class="page-header-text">
          <h1>${user.email.split('@')[0]}</h1>
          <p>${user.email} · Member since ${formatDate(profile.created_at || user.created_at)}</p>
        </div>
      </div>

      <!-- PLAN CARD -->
      <div class="card plan-card">
        <div class="card-title">
          <span>⚡</span> Current Plan
        </div>
        <div class="plan-info">
          <div>
            <div class="plan-badge">
              <div class="plan-dot"></div>
              ${getPlanLabel(profile.plan)}
            </div>
            ${profile.paid_at ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;">Active since ${formatDate(profile.paid_at)}</div>` : ''}
          </div>
          <div class="plan-scans">
            <div class="plan-scans-num"><span>${scansRemaining}</span> / ${scansLimit}</div>
            <div class="plan-scans-label">scans remaining this month</div>
          </div>
        </div>
        <div class="scan-progress-bar">
          <div class="scan-progress-fill" style="width: ${pct}%"></div>
        </div>
        <div class="scan-progress-labels">
          <span>${scansUsed} used</span>
          <span>${scansRemaining} remaining</span>
        </div>

        <div class="cancel-section">
          ${isPaid
            ? `<div class="cancel-text">To cancel or change your subscription, visit the billing portal.</div>
               <a href="${STRIPE_PORTAL}" target="_blank" class="cancel-btn">Manage Subscription →</a>`
            : `<div class="cancel-text">Upgrade to get more scans every month.</div>
               <a href="hooklens-scanner.html" class="upgrade-btn">Upgrade Plan →</a>`
          }
        </div>
      </div>

      <!-- SCAN HISTORY -->
      <div class="card">
        <div class="card-title"><span>📋</span> Scan History</div>
        ${historyHTML}
      </div>
    `;
  }

  function renderAuthRequired() {
    document.getElementById('mainPage').innerHTML = `
      <div class="auth-required">
        <h2>Sign in to view your profile</h2>
        <p>You need to be logged in to access your profile and scan history.</p>
        <a href="index.html" class="upgrade-btn">Go to Home →</a>
      </div>
    `;
  }

  // Init
  (async () => {
    await loadSupabase();
    const client = getClient();

    client.auth.onAuthStateChange(async (event, session) => {
      renderNav(session?.user || null);
    });

    const user = await getUser();
    renderNav(user);

    if (!user) {
      renderAuthRequired();
      return;
    }

    const profile = await getProfile(user.id);
    if (!profile) {
      // Profile missing — sync with backend then retry
      await syncUserWithBackend(user.email);
      const retryProfile = await getProfile(user.id);
      if (retryProfile) {
        await renderProfile(user, retryProfile);
      } else {
        renderAuthRequired();
      }
      return;
    }

    await renderProfile(user, profile);
  })();
</script>
</body>
</html>
